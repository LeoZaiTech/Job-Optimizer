<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Greenhouse Review Fixture</title>
  </head>
  <body>
    <main>
      <h1>Fixture Job</h1>
      <button type="button">Apply for this job</button>
      <form>
        <label>Full name <input aria-label="Full name" /></label>
        <label>First name <input id="first_name" /></label>
        <label>Last name <input id="last_name" /></label>
        <label>Email <input id="email" /></label>
        <label>Phone <input id="phone" /></label>
        <label>Current location <input aria-label="Current location" /></label>
        <label>LinkedIn <input aria-label="LinkedIn" /></label>
        <label>GitHub <input aria-label="GitHub" /></label>
        <label>Portfolio <input aria-label="Portfolio" /></label>
        <label>Work authorization <input aria-label="Work authorization" /></label>
        <label>Sponsorship <input aria-label="Sponsorship" /></label>
        <input type="file" name="resume" />
        <button type="submit">Submit application</button>
      </form>
    </main>
  </body>
</html>
